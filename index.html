<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>N4 歷屆試題溫習</title>
    <meta name="description" content="免費 JLPT N4 歷屆試題溫習網站，支援 2017、2021、2023、2024、2025 年真題，逐題作答、自動判分、答案原圖、聽解音頻播放。">
    <meta name="keywords" content="JLPT N4,N4歷屆試題,N4真題,日本語能力試驗,N4聽解,N4答案,N4 past paper">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#eef3f4">
    <link rel="canonical" href="https://leozzz2000.github.io/jlpt-n4-past-paper/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="N4 歷屆試題溫習">
    <meta property="og:description" content="JLPT N4 歷屆試題練習工具：選年份、逐題作答、自動判分，並支援答案原圖與聽解音頻。">
    <meta property="og:url" content="https://leozzz2000.github.io/jlpt-n4-past-paper/">
    <meta property="og:site_name" content="N4 歷屆試題溫習">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="N4 歷屆試題溫習">
    <meta name="twitter:description" content="免費 JLPT N4 真題練習網站，支援逐題作答、自動判分、聽解音頻播放。">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "N4 歷屆試題溫習",
        "url": "https://leozzz2000.github.io/jlpt-n4-past-paper/",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Any",
        "inLanguage": ["zh-Hant", "ja"],
        "description": "JLPT N4 歷屆試題練習工具，支援逐題作答、自動判分、答案原圖與聽解音頻播放。"
      }
    </script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="kicker">JLPT N4</div>
        <h1>N4 歷屆試題溫習</h1>
      </div>
      <div class="topbar-actions">
        <button id="themeToggleBtn" class="theme-toggle" type="button" aria-pressed="false" title="Switch to dark mode">☾ Dark</button>
        <div class="scorebox" aria-live="polite">
          <span id="scoreText">0 / 0</span>
          <span id="scoreRate">0%</span>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <aside class="sidebar">
        <section class="control-block">
          <label for="examSelect">試卷</label>
          <select id="examSelect"></select>
        </section>

        <section class="control-block">
          <label for="sectionSelect">部分</label>
          <select id="sectionSelect"></select>
        </section>

        <section class="control-block">
          <div class="row-label">
            <span>題目</span>
            <button id="clearProgressBtn" class="ghost-button" type="button">清除進度</button>
          </div>
          <div id="questionGrid" class="question-grid" aria-label="題目列表"></div>
        </section>
      </aside>

      <section class="paper-area">
        <div class="paper-toolbar">
          <div>
            <div id="questionMeta" class="question-meta"></div>
            <h2 id="questionTitle"></h2>
          </div>
          <div class="toolbar-actions">
            <button id="prevBtn" class="icon-button" type="button" title="上一題" aria-label="上一題">‹</button>
            <button id="nextBtn" class="icon-button" type="button" title="下一題" aria-label="下一題">›</button>
          </div>
        </div>

        <div id="notice" class="notice" hidden></div>
        <div id="audioPanel" class="audio-panel" hidden></div>

        <div class="question-panel">
          <div class="answer-card">
            <div id="answerStatus" class="answer-status neutral">未作答</div>
            <div class="choice-row" id="choiceRow"></div>
            <div class="answer-actions">
              <button id="revealBtn" class="secondary-button" type="button">顯示正確答案</button>
              <button id="answersImageBtn" class="secondary-button" type="button">答案原圖</button>
            </div>
          </div>

          <div class="viewer-card">
            <div class="viewer-head">
              <div id="pageLabel"></div>
              <div class="zoom-controls">
                <button id="zoomOutBtn" class="small-button" type="button">-</button>
                <span id="zoomText">100%</span>
                <button id="zoomInBtn" class="small-button" type="button">+</button>
              </div>
            </div>
            <div id="pageViewer" class="page-viewer"></div>
          </div>
        </div>
      </section>
    </main>

    <dialog id="answersDialog">
      <div class="dialog-head">
        <h3>答案原圖</h3>
        <button id="closeDialogBtn" class="icon-button" type="button" aria-label="關閉">×</button>
      </div>
      <div id="answersImages" class="answers-images"></div>
    </dialog>

    <footer class="site-footer">
      <a href="https://pub36.bravenet.com/guestbook/3036469485" target="_blank" rel="noopener">Feedback</a>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
